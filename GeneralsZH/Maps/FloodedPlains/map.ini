Weather
  SnowEnabled = YES ; enable/disable snow on the map.
  SnowTexture = EXRainDrop.tga ; texture used for each snow particle.

  SnowBoxDimensions = 100.0 ; width/height of the box around the camera containing snow.
  SnowBoxDensity = 1.0 ; amount of snow particles per world-unit. Raise to increase particle count.

  SnowFrequencyScaleX = 1.0 ; speed of side-to-side wave movement.
  SnowFrequencyScaleY = 1.0 ; speed of side-to-side wave movement.

  SnowAmplitude = 0.1 ; amount of side-to-side movement.
  SnowVelocity = 25.0 ; speed at which snow falls
  SnowPointSize = 0.3 ; scale the size of snow particles.

  ; Some video cards can't do hardware-accelerated particles. Set this
  ; setting to "no" in order see what emulation will look like. Use the
  ; SnowQuadSize setting to make it look similar to the PointSprite version.

  SnowPointSprites = YES ; set to "no" for PointSprite emulation.
  SnowQuadSize = 0.1 ; scale the size of snow particles when using PointSprite emulation.
End

WaterTransparency
  TransparentWaterMinOpacity = 0.75 ; opacity of water at maximum depth - 1.0 is opaque, 0 transparent.
  TransparentWaterDepth = 2.7 ; depth below water surface at which it becomes opaque (unless clipped by TransparentWaterMinOpacity)
End
