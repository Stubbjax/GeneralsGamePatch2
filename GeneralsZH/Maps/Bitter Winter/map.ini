; Set Environment Overrides

WaterTransparency
  TransparentWaterMinOpacity = 0.6 ; opacity of water at maximum depth - 1.0 is opaque, 0 transparent.
  TransparentWaterDepth = 2.0 ; depth below water surface at which it becomes opaque (unless clipped by TransparentWaterMinOpacity)
  ; StandingWaterColor = R:0 G:50 B:0
  ; StandingWaterColor = R:100 G:150 B:100
  StandingWaterColor = R:85 G:85 B:70
  ; StandingWaterTexture = TSWater03.tga
  ; AdditiveBlending = YES
  ; RadarWaterColor = R:100 G:196 B:100
End

Weather
  SnowEnabled = YES ; enable/disable snow on the map.
  SnowTexture = ExSnowFlake1.tga ; texture used for each snow particle.
  SnowBoxDimensions = 100.0 ; width/height of the box around the camera containing snow.
  SnowBoxDensity = 1.0 ; amount of snow particles per world-unit. Raise to increase particle count.
  SnowFrequencyScaleX = 0.0533 ; speed of side-to-side wave movement.
  SnowFrequencyScaleY = 0.0275 ; speed of side-to-side wave movement.
  SnowAmplitude = 4.0 ; amount of side-to-side movement.
  SnowVelocity = 3.0 ; speed at which snow falls
  SnowPointSize = 0.16 ; scale the size of snow particles.
  SnowMaxPointSize = 10.0 ; maximum pixel size of PointSprite particles (min-spec requires <= 64).
  SnowMinPointSize = 0.0 ; minimum pixel size of PointSprite particles.

  ; Some video cards can't do hardware-accelerated particles. Set this
  ; setting to "no" in order see what emulation will look like. Use the
  ; SnowQuadSize setting to make it look similar to the PointSprite version.

  SnowPointSprites = YES ; set to "no" for PointSprite emulation.
  SnowQuadSize = 0.5 ; scale the size of snow particles when using PointSprite emulation.
End
