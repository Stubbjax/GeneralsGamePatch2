; Language.ini
; This file contains all declarations that are specific to a language.
; for example, this is where we set the unicode font for a language

Language
  UnicodeFontName = 쒭뾐쾔
  ; LocalFontFile = PLCC____.TTF  ; When we add our game fonts... this is where we do it.
  UseHardWordWrap = YES           ; Used to force word wrapping no matter what character we are on at the end of the space
  CopyrightFont = 쒭뾐쾔 12 YES ; Used to display copyright at the start of the game
  MessageFont = 쒭뾐쾔 10 YES ; Used for messages at the top of the screen.
  MilitaryCaptionTitleFont = 쒭뾐쾔 12 YES ; Mission briefing text in the bottom-left corner.
  MilitaryCaptionFont = 쒭뾐쾔 12 NO ; Mission briefing text in the bottom-left corner.
  MilitaryCaptionDelayMS = 250
  SuperweaponCountdownNormalFont = 쒭뾐쾔 10 NO  ; superweapon countdown in the top right
  SuperweaponCountdownReadyFont = 쒭뾐쾔 10 YES  ; superweapon countdown in the top right
  NamedTimerCountdownNormalFont = 쒭뾐쾔 10 NO  ; mission-specific timer
  NamedTimerCountdownReadyFont = 쒭뾐쾔 10 NO  ; mission-specific timer
  DrawableCaptionFont = 쒭뾐쾔 10 NO ; captions over objects like construction percent.
  DefaultWindowFont = 쒭뾐쾔 14 NO ; default font used by windows that don't specify font.
  DefaultDisplayStringFont = 쒭뾐쾔 12 NO ; default font used for strings that don't specify font.
  TooltipFontName = 쒭뾐쾔 10 NO ; mouse tooltips
  NativeDebugDisplay = FixedSys 8 NO ; used to display frame rate and other debug stats.
  DrawGroupInfoFont = 쒭뾐쾔 10 NO ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsTitleFont = "Placard MT Condensed" 24 NO ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsMinorTitleFont = "Arial Unicode MS" 16 YES ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsNormalFont = "Arial Unicode MS" 14 NO ; used to display the number of the selection group to the left of a unit's health bar.
End
