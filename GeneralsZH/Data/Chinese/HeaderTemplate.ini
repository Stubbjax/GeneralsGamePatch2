; Contains templates we can assign to control in the game. The game can be customized
; depending on location with this system. For example, if we go to a Chinese font, we probably don't
; want things to be in bold so we can set up all the sections that used to use bold to not, as well as
; change the font if need be.

; Whenever we have large Titles
HeaderTemplate Title
  Font = "Agency FB"
  Point = 22
  Bold = YES
End

; This will be used for the buttons at the bottom of the screens
HeaderTemplate MainButton
  Font = "Agency FB"
  Point = 12
  Bold = NO
End

; This is used for the rest of the buttons
HeaderTemplate Button
  Font = "Batang"
  Point = 12
  Bold = NO
End

; This is used for all the small buttons (like the save/load buttons for the campaigns)
HeaderTemplate ButtonSmall
  Font = "Batang"
  Point = 10
  Bold = NO
End

; wherever we enter text we'll try to always use this
HeaderTemplate TextEntry
  Font = "Batang"
  Point = 10
  Bold = NO
End

; wherever we enter text we'll try to always use this
HeaderTemplate ComboBoxEntry
  Font = "Batang"
  Point = 10
  Bold = NO
End

; Used for all sub headings
HeaderTemplate MinorTitle
  Font = "Batang"
  Point = 10
  Bold = NO
End

; Used wherever we have static text labels (for example, all the score screen player information
HeaderTemplate LabelRegular
  Font = "Batang"
  Point = 10
  Bold = NO
End

; Used wherever we have small static text labels (for example, on the side selection window)
HeaderTemplate LabelSmall
  Font = "Batang"
  Point = 10
  Bold = NO
End

; Used only on the load screen under the cameos that pop up partway through the load movie
HeaderTemplate LoadScreenCameos
  Font = "Batang"
  Point = 10
  Bold = NO
End

; Used only on the load screen located at the bottom of the zoomed-in map
HeaderTemplate LoadScreenMissionLocation
  Font = "Placard MT Condensed"
  Point = 14
  Bold = NO
End

HeaderTemplate Arial10BoldTemplate
  Font = "Batang"
  Point = 10
  Bold = NO
End

HeaderTemplate Arial12BoldTemplate
  Font = "Batang"
  Point = 12
  Bold = NO
End

HeaderTemplate Arial14Template
  Font = "Batang"
  Point = 14
  Bold = NO
End

HeaderTemplate Arial14BoldTemplate
  Font = "Batang"
  Point = 14
  Bold = NO
End
