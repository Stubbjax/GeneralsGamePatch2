Object RocketBuggyMissileDebris
  ; *** ART Parameters ***
  Draw = W3DModelDraw ModuleTag_01
    OkToChangeModelColor = YES
    ConditionState = NONE
      Model = NVMBuggy_m
    End
  End

  ; *** DESIGN Parameters ***
  DisplayName = OBJECT:RocketBuggyDebris
  EditorSorting = SYSTEM
  ArmorSet
    Conditions = NONE
    Armor = ProjectileArmor
    DamageFX = NONE
  End

  ; *** ENGINEERING Parameters ***
  Body = ActiveBody ModuleTag_02
    MaxHealth = 100.0
    InitialHealth = 100.0
  End

  Behavior = PhysicsBehavior ModuleTag_03
    Mass = 3.0
    AllowBouncing = YES
  End

  Behavior = LifetimeUpdate ModuleTag_04
    MinLifetime = 0 ; min lifetime in milliseconds
    MaxLifetime = 0 ; max lifetime in milliseconds
  End
  Behavior = SlowDeathBehavior ModuleTag_05
    DestructionDelay = 500
    DestructionDelayVariance = 500
    FX = INITIAL FX_BuggyMissileDebris
    FX = FINAL WeaponFX_RocketBuggyMissileDetonation
  End

  Geometry = SPHERE
  GeometryIsSmall = YES
  GeometryMajorRadius = 2.0
End
