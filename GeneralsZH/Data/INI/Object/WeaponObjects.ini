; This beam destroys incoming missiles

Object AvengerPointDefenseLaserBeam
  ; *** ART Parameters ***
  Draw = W3DLaserDraw ModuleTag_01
    Texture = EXLaser4.tga
    NumBeams = 4 ; Number of overlapping cylinders that make the beam. 1 beam will just use inner data.
    InnerBeamWidth = 0.005 ; The total width of the beam
    InnerColor = R:255 G:180 B:100 A:120 ; The inside color of the laser (hot)
    OuterBeamWidth = 10.0 ; The total width of the beam
    OuterColor = R:100 G:100 B:100 A:60 ; The outside color of the laser (cool)
    Tile = YES ; The height of the texture will determine how many times to tile the texture to fit without scaling.
    ScrollRate = -2500.0 ; Scrolls the texture offset this fast -- towards(-) away(+)
    Segments = 1 ; Number of segments -- more segments give a smoother curve (but more joints) Current max: 20
    SegmentOverlapRatio = 0.0 ; This value overlaps(+) or separates(-) the segments by ratio
    TilingScalar = -3.0 ; Stretches tiling if value > 1.0, otherwise shrinks it (1.0 is natural)

    ; MaxIntensityLifetime = 2000 ; Laser stays at max intensity for the specified time in ms.
    ; FadeLifetime = 250 ; Laser will fade and delete.
    ; @todo -- add shot ability functionality (instead of instant point A to B)
  End

  KindOf = IMMOBILE INERT
  ClientUpdate = LaserUpdate ModuleTag_02
    MuzzleParticleSystem = PaladinPointDefenseLaserFlare
    TargetParticleSystem = AvengerDestroySmoke
  End

  ; Used as a weapon, this is essentially a fast pulse laser. Adjusting
  ; the lifetime values will determine how long it renders. The damage
  ; is applied immediately, so lifetime doesn't matter.
  Behavior = LifetimeUpdate ModuleTag_03
    MinLifetime = 95 ; min lifetime in milliseconds
    MaxLifetime = 95 ; max lifetime in milliseconds
  End
  Behavior = DestroyDie ModuleTag_04
    ; <NO DATA>
  End
End

