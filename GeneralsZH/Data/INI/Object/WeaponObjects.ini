    CourseCorrectionScalar = 0.99 ; 1 == no homing, 0 == snap to; 0.99 == smooth, 0.95 == too fast
  End

  Geometry = SPHERE
  GeometryIsSmall = YES
  GeometryMajorRadius = 12.0
End

