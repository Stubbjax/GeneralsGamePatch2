      WeaponLaunchBone = PRIMARY RocketFX03
      WeaponMuzzleFlash = PRIMARY MuzzleFX_B
      ParticleSysBone = SMOKE CombatBikeSmokeLight
      ShowSubObject = BOMBBIKE
    End
    AliasConditionState = RIDER5 MOVING

