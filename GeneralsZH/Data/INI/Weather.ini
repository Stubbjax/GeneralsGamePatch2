Weather
  SnowEnabled = NO ; enable/disable snow on the map.
  SnowTexture = ExSnowFlake.tga ; texture used for each snow particle.
  SnowBoxDimensions = 200.0 ; width/height of the box around the camera containing snow.
  SnowBoxDensity = 1.0 ; amount of snow particles per world-unit. Raise to increase particle count.
  SnowFrequencyScaleX = 0.0533 ; speed of side-to-side wave movement.
  SnowFrequencyScaleY = 0.0275 ; speed of side-to-side wave movement.
  SnowAmplitude = 5.0 ; amount of side-to-side movement.
  SnowVelocity = 4.0 ; speed at which snow falls
  SnowPointSize = 1.0 ; scale the size of snow particles.
  SnowMaxPointSize = 64.0 ; maximum pixel size of PointSprite particles (min-spec requires <= 64).
  SnowMinPointSize = 0.0 ; minimum pixel size of PointSprite particles.

  ; Some video cards can't do hardware-accelerated particles. Set this
  ; setting to "no" in order see what emulation will look like. Use the
  ; SnowQuadSize setting to make it look similar to the PointSprite version.
  SnowPointSprites = YES ; set to "no" for PointSprite emulation.
  SnowQuadSize = 0.5 ; scale the size of snow particles when using PointSprite emulation.
End
