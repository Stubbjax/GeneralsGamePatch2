Armor NoArmor
  Armor = DEFAULT 100.0% ; this sets the level for all non-specified damage types
  Armor = HAZARD_CLEANUP 0.0% ; Not harmed by cleaning weapons
End

Armor HumanArmor
  Armor = CRUSH 200.0% ; humans are easily crushed ["I'm crushing your head"]
  Armor = ARMOR_PIERCING 10.0% ; humans don't get hit by tank rounds.
  Armor = INFANTRY_MISSILE 10.0%
  Armor = FLAME 150.0% ; humans don't like fire
  Armor = PARTICLE_BEAM 150.0% ; humans don't fare well against orbital beams...
  Armor = SNIPER 200.0%
