EvaEvent LowPower
  Priority = 2
  TimeBetweenChecksMS = 120000
  ExpirationTimeMS = 5000

  SideSounds
    Side = America
    Sounds = EvaUSA_LowPower
  End

  SideSounds
    Side = China
    Sounds = EvaChina_LowPower
  End

  SideSounds
    Side = GLA
    Sounds = EvaGLA_LowPower
  End
End



