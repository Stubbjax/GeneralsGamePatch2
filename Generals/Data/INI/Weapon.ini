Weapon MarauderTankGun
  PrimaryDamage = 60.0
  PrimaryDamageRadius = 5.0
  AttackRange = 150.0
  ScatterRadiusVsInfantry = 10.0 ; When this weapon is used against infantry, it can randomly miss by as much as this distance.
  MinTargetPitch = -15.0 ; we may not target anything outside of this pitch range
  MaxTargetPitch = 15.0 ; ditto
  DamageType = ARMOR_PIERCING
  DeathType = NORMAL
  WeaponSpeed = 300.0 ; dist/sec
  WeaponRecoil = 10.0
  ProjectileObject = MarauderTankShell
  FireFX = WeaponFX_GenericTankGunNoTracer
  VeterancyFireFX = HEROIC WeaponFX_HeroicGenericTankGunNoTracer
  FireSound = MarauderTankWeapon
  ProjectileDetonationFX = WeaponFX_GenericTankShellDetonation
  RadiusDamageAffects = ALLIES ENEMIES NEUTRALS
  DelayBetweenShots = 2000 ; time between shots, msec
  ClipSize = 0 ; how many shots in a Clip (0 == infinite)
  ClipReloadTime = 0 ; how long to reload a Clip, msec

  ; note, these only apply to units that aren't the explicit target
  ; (i.e. units that just happen to "get in the way"... projectiles
  ; always collide with the Designated Target, regardless of these flags
  ProjectileCollidesWith = STRUCTURES WALLS
End

