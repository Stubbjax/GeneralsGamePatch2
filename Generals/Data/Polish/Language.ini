; Language.ini
; This file contains all declarations that are specific to a language.
; for example, this is where we set the unicode font for a language

Language
  UnicodeFontName = "Arial Narrow"
  MilitaryCaptionSpeed = 0        ; the caption speed for the mission location type
  ; LocalFontFile = PLCC____.TTF  ; When we add our game fonts... this is where we do it.
  CopyrightFont = "Arial Narrow" 14 NO ; Used to display copyright at the start of the game
  MessageFont = "Arial Narrow" 10 YES ; Used for messages at the top of the screen.
  MilitaryCaptionTitleFont = "Arial Narrow" 12 YES ; Mission briefing text in the bottom-left corner.
  MilitaryCaptionFont = "Arial Narrow" 12 NO ; Mission briefing text in the bottom-left corner.
  SuperweaponCountdownNormalFont = "Arial Narrow" 10 NO  ; superweapon countdown in the top right
  SuperweaponCountdownReadyFont = "Arial Narrow" 10 YES  ; superweapon countdown in the top right
  NamedTimerCountdownNormalFont = "Arial Narrow" 10 NO  ; mission-specific timer
  NamedTimerCountdownReadyFont = "Arial Narrow" 10 NO  ; mission-specific timer
  DrawableCaptionFont = "Arial Narrow" 10 NO ; captions over objects like construction percent.
  DefaultWindowFont = "Arial Narrow" 14 NO ; default font used by windows that don't specify font.
  DefaultDisplayStringFont = "Arial Narrow" 12 NO ; default font used for strings that don't specify font.
  TooltipFontName = "Arial Narrow" 10 NO ; mouse tooltips
  NativeDebugDisplay = "Arial Narrow" 8 NO ; used to display frame rate and other debug stats.
  DrawGroupInfoFont = "Arial Narrow" 10 NO ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsTitleFont = "Arial Narrow" 24 NO ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsMinorTitleFont = "Arial Narrow" 16 YES ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsNormalFont = "Arial Narrow" 14 NO ; used to display the number of the selection group to the left of a unit's health bar.
  ResolutionFontAdjustment = 0.7 ; Fonts increase at 70% the rate the resolution increases.
End
