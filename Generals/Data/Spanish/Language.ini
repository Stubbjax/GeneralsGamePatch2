; Language.ini
; This file contains all declarations that are specific to a language.
; for example, this is where we set the unicode font for a language

Language
  UnicodeFontName = "Arial Unicode MS"
  MilitaryCaptionSpeed = 0 ; the caption speed for the mission location type
  ; LocalFontFile = PLCC____.TTF ; When we add our game fonts... this is where we do it.
  CopyrightFont = Courier 12 YES ; Used to display copyright at the start of the game
  MessageFont = Arial 10 YES ; Used for messages at the top of the screen.
  MilitaryCaptionTitleFont = "Courier New" 12 YES ; Mission briefing text in the bottom-left corner.
  MilitaryCaptionFont = "Courier New" 12 NO ; Mission briefing text in the bottom-left corner.
  SuperweaponCountdownNormalFont = Arial 10 NO ; superweapon countdown in the top right
  SuperweaponCountdownReadyFont = Arial 10 YES ; superweapon countdown in the top right
  NamedTimerCountdownNormalFont = Arial 10 NO ; mission-specific timer
  NamedTimerCountdownReadyFont = Arial 10 NO ; mission-specific timer
  DrawableCaptionFont = Arial 10 NO ; captions over objects like construction percent.
  DefaultWindowFont = "Times New Roman" 14 NO ; default font used by windows that don't specify a font.
  DefaultDisplayStringFont = "Times New Roman" 12 NO ; default font used for strings that don't specify a font.
  TooltipFontName = Arial 8 NO ; mouse tooltips
  NativeDebugDisplay = FixedSys 8 NO ; used to display the frame rate and other debug stats.
  DrawGroupInfoFont = Arial 10 NO ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsTitleFont = Arial 24 NO ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsMinorTitleFont = Arial 16 YES ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsNormalFont = Arial 14 NO ; used to display the number of the selection group to the left of a unit's health bar.
  ResolutionFontAdjustment = 0.7 ; Fonts increase at 70% the rate the resolution increases.
End
