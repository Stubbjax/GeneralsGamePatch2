; Language.ini
; This file contains all declarations that are specific to a language.
; for example, this is where we set the unicode font for a language

Language
  ; UnicodeFontName = "Batang Unicode MS"
  UnicodeFontName = "Batang"
  ; LocalFontFile = PLCC____.TTF ; When we add our game fonts... this is where we do it.
  UseHardWordWrap = YES ; Used to force word wrapping no matter what character we are on at the end of the space
  CopyrightFont = Courier 12 YES ; Used to display copyright at the start of the game
  MessageFont = Batang 10 NO ; Used for messages at the top of the screen.
  MilitaryCaptionTitleFont = "Courier New" 12 YES ; Mission briefing text in the bottom-left corner.
  MilitaryCaptionFont = "Courier New" 12 NO ; Mission briefing text in the bottom-left corner.
  SuperweaponCountdownNormalFont = Batang 10 NO ; superweapon countdown in the top right
  SuperweaponCountdownReadyFont = Batang 10 NO ; superweapon countdown in the top right
  NamedTimerCountdownNormalFont = Batang 10 NO ; mission-specific timer
  NamedTimerCountdownReadyFont = Batang 10 NO ; mission-specific timer
  DrawableCaptionFont = Batang 10 NO ; captions over objects like construction percent.
  DefaultWindowFont = "Times New Roman" 14 NO ; default font used by windows that don't specify a font.
  DefaultDisplayStringFont = "Times New Roman" 12 NO ; default font used for strings that don't specify a font.
  TooltipFontName = Batang 8 NO ; mouse tooltips
  NativeDebugDisplay = FixedSys 8 NO ; used to display the frame rate and other debug stats.
  DrawGroupInfoFont = Batang 10 NO ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsTitleFont = "Placard MT Condensed" 24 NO ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsMinorTitleFont = "Batang Unicode MS" 16 YES ; used to display the number of the selection group to the left of a unit's health bar.
  CreditsNormalFont = "Batang Unicode MS" 14 NO ; used to display the number of the selection group to the left of a unit's health bar.
End
