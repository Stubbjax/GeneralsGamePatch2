ObjectCreationList SUPERWEAPON_CrateDrop
  DeliverPayload
    Transport = AmericaJetCargoPlane
    StartAtPreferredHeight = YES
    StartAtMaxSpeed = YES
    MaxAttempts = 4
    DropOffset = X:0.0 Y:0.0 Z:-5.0
    DropDelay = 300 ; time between each dropped item (if more than one)
    PutInContainer = AmericaParachute
    Payload = 200DollarCrate 10
    DeliveryDistance = 250.0
    DeliveryDecalRadius = 0.0
    DeliveryDecal
      Texture = EXTargeterAlpha
      Style = SHADOW_ALPHA_DECAL
      OpacityMin = 50.0%
      OpacityMax = 100.0%
      OpacityThrobTime = 500
      Color = R:255 G:0 B:255 A:255
      OnlyVisibleToOwningPlayer = YES
    End
  End
End

